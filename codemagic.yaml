workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60

    environment:
      flutter: stable
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.nasaka.equinoscaninos

    scripts:
      - name: Clean Flutter
        script: |
          flutter clean

      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Build iOS IPA
        script: |
          flutter build ipa --release --export-method app-store

    artifacts:
      - build/ios/ipa/*.ipa