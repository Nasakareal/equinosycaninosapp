workflows:
  ios-simulator-preview:
    name: iOS Simulator App Preview
    max_build_duration: 60

    environment:
      flutter: stable

    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Build iOS Simulator App (.app)
        script: |
          flutter build ios \
            --simulator \
            --debug \
            --no-codesign

      - name: Show output
        script: |
          ls -lh build/ios/iphonesimulator/

    artifacts:
      - build/ios/iphonesimulator/*.app
      - build/ios/iphonesimulator/Runner.app

  ios-release:
    name: iOS Release (TestFlight)
    max_build_duration: 60

    environment:
      flutter: stable
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.tuempresa.equinoscaninos

    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Build IPA (Release)
        script: |
          flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true